<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- 배경 rounded square (macOS 아이콘 표준 비율) -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- 코드 라인 텍스처 (배경 질감) -->
  <rect x="72" y="108" width="180" height="14" rx="7" fill="rgba(255,255,255,0.07)"/>
  <rect x="72" y="134" width="268" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
  <rect x="72" y="160" width="210" height="14" rx="7" fill="rgba(255,255,255,0.04)"/>
  <rect x="72" y="186" width="148" height="14" rx="7" fill="rgba(255,255,255,0.03)"/>

  <!-- > 심볼 (chevron path) -->
  <path d="M 68,172 L 216,256 L 68,340"
        stroke="#a9dc76"
        stroke-width="52"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- _ 심볼 (underscore rectangle) -->
  <rect x="248" y="324" width="196" height="48" rx="14" fill="#a9dc76"/>
</svg>
